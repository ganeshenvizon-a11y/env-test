<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Blog - Envizon Studio</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="assets/css/base/variables.css">

    <link rel="stylesheet"
          href="assets/css/base/reset.css">

    <link rel="stylesheet"
          href="assets/css/base/fonts.css">

    <link rel="stylesheet"
          href="assets/css/base/services-variables.css">

    <link rel="stylesheet"
          href="css/header.css">

    <link rel="stylesheet"
          href="assets/css/components/buttons.css">

    <link rel="stylesheet"
          href="assets/css/components/services-layout.css">

    <link rel="stylesheet"
          href="assets/css/components/services-hero.css">

    <link rel="stylesheet"
          href="assets/css/components/blog-article-content.css">

    <link rel="stylesheet"
          href="assets/css/components/loading-state.css">

    <link rel="stylesheet"
          href="assets/css/components/blog-sidebar.css">

    <link rel="stylesheet"
          href="assets/css/components/blog-single-breadcrumb.css">

    <link rel="stylesheet"
          href="assets/css/components/blog-article-nav.css">

    <link rel="stylesheet"
          href="assets/css/components/blog-back-link.css">

    <link rel="stylesheet"
          href="assets/css/components/blog-reading-progress.css">

    <link rel="stylesheet"
          href="assets/css/components/blog-share.css">

    <link rel="stylesheet"
          href="assets/css/components/insights.css">

    <link rel="stylesheet"
          href="assets/css/components/blog-related-articles.css">



    <link rel="stylesheet"
          href="assets/css/components/services-cta.css">

    <link rel="stylesheet"
          href="css/footer.css">

</head>

<body>
<div class="reading-progress" id="readingProgress" aria-hidden="true">
  <div class="reading-progress__bar" id="readingProgressBar"></div>
</div>

<header class="header"></header>

<div class="works-internal-ui-v10 blog-single-shell">
  <div class="blog-single-bg-clip">
    <img
      class="works-internal-ui-v10-child"
      alt=""
      src="assets/images/services/Rectangle-34624738.svg"
    />
  </div>

  <!-- <div class="blog-back-link-wrapper">
    <a href="blog.html" class="blog-back-link">
      <span class="blog-back-link__arrow" aria-hidden="true">←</span> Back to Blogs
    </a>
  </div> -->

  <section class="blog-single-breadcrumb-wrapper">
    <nav class="blog-single-breadcrumb" id="blogSingleBreadcrumb" aria-label="Breadcrumb" hidden>
      <a href="index.html">Home</a>
      <span class="blog-single-breadcrumb-sep" aria-hidden="true">/</span>
      <a href="blog.html">Blogs</a>
      <span class="blog-single-breadcrumb-sep" id="blogSingleBreadcrumbCategorySep" aria-hidden="true" hidden>/</span>
      <a href="#" class="blog-single-breadcrumb-current" id="blogSingleBreadcrumbCategory" hidden></a>
    </nav>
  </section>

  <section class="main-content">
    <div class="hero-container">
      <section class="client-highlight">
        <div class="client-card">
          <h2 class="popl" id="postTitle">Loading article…</h2>
          <div class="services-header">
            <h3 class="services-provided" id="postReadingTime"></h3>
          </div>
        </div>
        <div class="client-overview-details">
          <div class="after-gaining-early" id="postMeta"></div>
          <div class="service-tag-list" id="postCategoryList"></div>
        </div>
      </section>
      <img
        class="hero-container-child"
        id="postFeaturedImage"
        loading="lazy"
        alt=""
        src=""
      />
    </div>
  </section>

  <section class="article-content-wrapper">
    <div class="article-layout">
      <div class="article-content" id="articleContent">
        <div class="loading-state">Loading article…</div>
      </div>
      <aside class="blog-sidebar" id="blogSidebar">
        <div class="blog-sidebar__sticky">
          <form class="sidebar-search" id="sidebarSearchForm" role="search">
            <input type="search" class="sidebar-search__input" id="sidebarSearchInput" name="search"
                   placeholder="Search articles..." aria-label="Search articles">
            <button type="submit" class="sidebar-search__button" aria-label="Search">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.6"/>
                <path d="M16 16L13 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </button>
          </form>
          <div class="sidebar-featured" id="sidebarFeatured"></div>
          <div class="sidebar-recent" id="sidebarRecent">
            <h3 class="sidebar-recent__heading">Recent Blogs</h3>
            <div class="sidebar-recent__list" id="sidebarRecentList"></div>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <div class="article-share-wrapper">
    <div class="article-share" id="articleShare" hidden>
      <span class="article-share__label">Share this article</span>
      <div class="article-share__actions">
        <a class="article-share__btn" id="shareLinkedIn" href="#" target="_blank" rel="noopener" aria-label="Share on LinkedIn">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6.94 8.5H3.56V20.5H6.94V8.5Z" fill="currentColor"/>
            <path d="M5.25 6.75C6.35 6.75 7.19 5.91 7.19 4.87C7.19 3.83 6.35 3 5.25 3C4.19 3 3.31 3.83 3.31 4.87C3.31 5.91 4.19 6.75 5.25 6.75Z" fill="currentColor"/>
            <path d="M13.44 8.5H10.19V20.5H13.56V14.44C13.56 12.81 13.87 11.25 15.87 11.25C17.83 11.25 17.87 13.09 17.87 14.56V20.5H21.25V13.87C21.25 10.94 20.62 8.19 17.19 8.19C15.56 8.19 14.44 9.09 13.98 9.94H13.94L13.44 8.5Z" fill="currentColor"/>
          </svg>
        </a>
        <a class="article-share__btn" id="shareFacebook" href="#" target="_blank" rel="noopener" aria-label="Share on Facebook">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15.5 8.5H17.5V5.13C17.16 5.09 16 5 14.65 5C11.79 5 9.83 6.75 9.83 9.95V12.5H6.65V16.25H9.83V21.5H13.7V16.25H16.76L17.24 12.5H13.7V10.32C13.7 9.25 13.99 8.5 15.5 8.5Z" fill="currentColor"/>
          </svg>
        </a>
        <a class="article-share__btn" id="shareTwitter" href="#" target="_blank" rel="noopener" aria-label="Share on X">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M17.53 3H20.5L14.36 10.02L21.58 21H15.93L11.5 14.77L6.43 21H3.46L10.03 13.48L3.1 3H8.9L12.9 8.73L17.53 3ZM16.54 19.3H18.11L8.22 4.6H6.54L16.54 19.3Z" fill="currentColor"/>
          </svg>
        </a>
        <button type="button" class="article-share__btn" id="shareCopyLink" aria-label="Copy link">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.5 13.5C11 14.16 11.63 14.7 12.35 15.08C13.07 15.46 13.86 15.67 14.67 15.7C15.48 15.73 16.29 15.58 17.03 15.26C17.78 14.94 18.44 14.46 18.98 13.85L22.11 10.72C23.09 9.7 23.63 8.34 23.62 6.93C23.61 5.52 23.04 4.17 22.04 3.17C21.04 2.17 19.69 1.6 18.28 1.59C16.87 1.58 15.51 2.12 14.49 3.1L12.65 4.93" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13.5 10.5C13 9.84 12.37 9.3 11.65 8.92C10.93 8.54 10.14 8.33 9.33 8.3C8.52 8.27 7.71 8.42 6.97 8.74C6.22 9.06 5.56 9.54 5.02 10.15L1.89 13.28C0.91 14.3 0.37 15.66 0.38 17.07C0.39 18.48 0.96 19.83 1.96 20.83C2.96 21.83 4.31 22.4 5.72 22.41C7.13 22.42 8.49 21.88 9.51 20.9L11.34 19.07" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <span class="article-share__toast" id="shareToast" role="status" aria-live="polite" hidden>Link copied!</span>
    </div>
  </div>

  <section class="article-nav-wrapper">
    <nav class="article-nav" id="articleNav" aria-label="Article navigation" hidden></nav>
  </section>

  <div class="related-articles-wrapper">
    <section class="related-articles" id="relatedArticles" hidden>
      <h2 class="related-articles__heading">Related Articles</h2>
      <div class="insights__grid" id="relatedArticlesGrid"></div>
    </section>
  </div>

  <div class="global-cta">
      <section class="call-to-action-content">
        <div class="frame-parent">
          <div class="lets-build-something-people-r-parent">
            <h1 class="lets-build-something-container">
              <span class="lets-build-something"
                >Let's Build Something<br
              /></span>
              <span class="people-remember">People Remember</span>
            </h1>
            <div class="decorative-elements">
              <img
                class="decorative-elements-child"
                alt=""
                src="assets/images/services/Group-2087327210.svg"
              />

              <img
                class="dot-one-icon"
                loading="lazy"
                alt=""
                src="assets/images/services/Ellipse-2@2x.png"
              />

              <img
                class="dot-two-icon"
                loading="lazy"
                alt=""
                src="assets/images/services/Ellipse-3@2x.png"
              />

              <img
                class="dot-three-icon"
                loading="lazy"
                alt=""
                src="assets/images/services/Ellipse-5@2x.png"
              />

              <img
                class="dot-four-icon"
                loading="lazy"
                alt=""
                src="assets/images/services/Ellipse-5@2x.png"
              />
            </div>
          </div>
          <div class="cta-button-wrapper">
            <a href="contact.html" class="link6">
              <div class="book-a-discovery">Book A Discovery Call</div>
              <img class="svg-icon" alt="" src="assets/images/services/SVG1.svg" />
            </a>
          </div>
        </div>
      </section>
      <footer class="footer"></footer>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script type="module" src="js/header.js"></script>
<script type="module" src="js/footer.js"></script>
<script type="module" src="js/blog-single.js"></script>
<script type="module" src="js/blog-sidebar.js"></script>
<script type="module" src="js/blog-article-nav.js"></script>
<script type="module" src="js/blog-share.js"></script>
<script type="module" src="js/blog-reading-progress.js"></script>
<script type="module" src="js/blog-related-articles.js"></script>

</body>
</html>
